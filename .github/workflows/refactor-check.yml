name: Refactor and Code Quality Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  detect-duplicates:
    runs-on: ubuntu-latest
    name: Detect Code Duplication

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'apps/backend/requirements.txt'

    - name: Install dependencies
      run: |
        pip install -r apps/backend/requirements.txt

    - name: Run duplication detection
      run: |
        python scripts/detect_duplicates.py

    - name: Upload duplication report
      uses: actions/upload-artifact@v4
      with:
        name: duplication-report
        path: docs/duplication-report.md
        retention-days: 30

    - name: Check for high duplication
      run: |
        # Check if report contains high priority issues
        if grep -q "High Priority" docs/duplication-report.md; then
          echo "::warning::High code duplication detected. Review the duplication report."

        fi

  run-tests:
    runs-on: ubuntu-latest
    name: Run Tests for Refactored Code
    needs: detect-duplicates

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: 'apps/backend/requirements.txt'

    - name: Install dependencies
      run: |
        pip install -r apps/backend/requirements.txt
        pip install pytest pytest-cov

    - name: Run tests for new utilities
      working-directory: apps/backend
      env:
        TEST_MINIMAL: "1"
      run: |
        # Use `python -m pytest` so the current working directory is added to
        # sys.path. Otherwise the bridge conftest at tests/conftest.py cannot
        # import `app.tests.conftest` and pytest fails at collection time.
        #
        # NOTE: pass the coverage target as a FILE PATH (app/models/base.py), not
        # a dotted module (app.models.base). With a dotted leaf module, coverage
        # imports it at startup — before the test conftest sets up the env/paths —
        # which double-loads SQLAlchemy and aborts collection with
        # "Type <class 'object'> is already registered". The file-path form
        # measures the same file without importing it early.

        # These are targeted single-file runs, so override the global
        # --cov-fail-under=40 gate from pytest.ini (--cov-fail-under=0): the
        # goal here is per-module coverage reports, not the repo-wide threshold.

        # Run tests for BaseCatalogModel
        python -m pytest tests/test_base_catalog_model.py -v --cov=app/models/base.py --cov-fail-under=0

        # Run tests for validation decorators
        python -m pytest tests/test_validation_decorators.py -v --cov=app/decorators/validation.py --cov-fail-under=0

        # Run tests for schema generator
        python -m pytest tests/test_schema_generator.py -v --cov=app/utils/schema_generator.py --cov-fail-under=0

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: htmlcov/
        retention-days: 30

  quality-gate:
    runs-on: ubuntu-latest
    name: Quality Gate
    needs: [detect-duplicates, run-tests]

    steps:
    - name: Download reports
      uses: actions/download-artifact@v4
      with:
        name: duplication-report
        path: docs/

    - name: Quality check
      run: |
        # Count issues in report
        HIGH_ISSUES=$(grep -c "High Priority" duplication-report.md || echo "0")
        TOTAL_ISSUES=$(grep -c "Priority" duplication-report.md || echo "0")

        echo "::set-output name=high_issues::$HIGH_ISSUES"
        echo "::set-output name=total_issues::$TOTAL_ISSUES"

        # Fail if too many issues
        if [ "$HIGH_ISSUES" -gt 5 ]; then
          echo "::error::Too many high-priority duplication issues ($HIGH_ISSUES)"
          exit 1
        fi

        if [ "$TOTAL_ISSUES" -gt 20 ]; then
          echo "::error::Too many total duplication issues ($TOTAL_ISSUES)"
          exit 1
        fi

    - name: Create quality badge
      run: |
        # Create a simple quality badge
        HIGH_ISSUES=$(grep -c "High Priority" duplication-report.md || echo "0")
        TOTAL_ISSUES=$(grep -c "Priority" duplication-report.md || echo "0")

        if [ "$HIGH_ISSUES" -eq 0 ]; then
          COLOR="brightgreen"
          STATUS="Excellent"
        elif [ "$HIGH_ISSUES" -le 3 ]; then
          COLOR="green"
          STATUS="Good"
        elif [ "$HIGH_ISSUES" -le 7 ]; then
          COLOR="yellow"
          STATUS="Fair"
        else
          COLOR="red"
          STATUS="Poor"
        fi

        echo "Code Quality: $STATUS ($HIGH_ISSUES high issues, $TOTAL_ISSUES total)"

        # Create badge (simplified version)
        echo "![$STATUS](https://img.shields.io/badge/quality-$STATUS-$COLOR.svg)" > quality-badge.md
